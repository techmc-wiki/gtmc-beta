name: Build
permissions:
  contents: read

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "pnpm"

      - name: Restore Next.js cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml', 'next.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate
        env:
          DATABASE_URL: "postgresql://localhost:5432/placeholder"

      - name: Resolve articles submodule SHA
        id: submodule-sha
        # postinstall initializes the submodule, so this is safe to run here.
        run: git -C articles rev-parse HEAD

      - name: Cache content artifacts
        id: cache-content
        uses: actions/cache@v5
        with:
          path: |
            data/manifest.json
            data/articles
            data/glossary*.json
            public/gtmc.pdf
          key: content-${{ steps.submodule-sha.outputs.sha }}-${{ hashFiles('scripts/**', 'lib/articles/**') }}
          restore-keys: |
            content-${{ steps.submodule-sha.outputs.sha }}-

      - name: TypeScript Check
        run: node --run typecheck

      - name: Build
        env:
          GTMC_SKIP_CONTENT_BUILD: ${{ steps.cache-content.outputs.cache-hit == 'true' }}
        run: node --run build
